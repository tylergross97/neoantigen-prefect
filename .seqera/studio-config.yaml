schemaVersion: "0.0.1"
kind: "studio-config"

session:
  name: "neoantigen-prefect"
  description: "Prefect orchestration flow for neoantigen prediction — polls Seqera Platform pipelines remotely"

  template:
    kind: "dockerfile"
    dockerfile: "Dockerfile"


  computeRequirements:
    awsBatch:
      cpu: 2
      gpu: 0
      memory: 8192

  environmentVariables:
    # SEQERA_ACCESS_TOKEN should be set manually in the UI environment variables panel
    # to avoid committing secrets to the repository
    - name: "SEQERA_WORKSPACE_ID"
      value: "241557511768949"
    - name: "PYTHONPATH"
      value: "/app"
    - name: "PYTHONUNBUFFERED"
      value: "1"
